<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>agent-doc</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="toolbar">
      <h1>agent-doc</h1>
      <div id="toolbar-actions">
        <button id="submit-btn" title="Submit to agent (Ctrl+Enter)">Submit</button>
        <button id="settings-btn" title="Settings">Settings</button>
      </div>
    </header>
    <main id="editor-container">
      <div id="editor"></div>
    </main>
    <footer id="status-bar">
      <span id="status-text">Ready</span>
    </footer>
  </div>

  <dialog id="settings-dialog">
    <form method="dialog">
      <h2>Settings</h2>
      <label>
        Anthropic API Key
        <input type="password" id="api-key-input" placeholder="sk-ant-...">
      </label>
      <label>
        Model
        <select id="model-select">
          <option value="claude-sonnet-4-6">Claude Sonnet 4.6</option>
          <option value="claude-opus-4-6">Claude Opus 4.6</option>
          <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5</option>
        </select>
      </label>
      <label>
        System Prompt (optional)
        <textarea id="system-prompt-input" rows="4" placeholder="Custom instructions for the agent..."></textarea>
      </label>
      <div class="dialog-actions">
        <button type="submit" id="settings-save">Save</button>
        <button type="button" id="settings-cancel">Cancel</button>
      </div>
    </form>
  </dialog>

  <script type="module">
    // Load all CodeMirror from a single esm.sh bundle to avoid duplicate @codemirror/state instances
    const CM_STATE = 'https://esm.sh/@codemirror/state@6.5.2'
    const CM_VIEW = 'https://esm.sh/@codemirror/view@6.36.5?external=@codemirror/state'
    const CM_LANG = 'https://esm.sh/@codemirror/language@6.10.8?external=@codemirror/state,@codemirror/view'
    const CM_COMMANDS = 'https://esm.sh/@codemirror/commands@6.8.0?external=@codemirror/state,@codemirror/view,@codemirror/language'
    const CM_MARKDOWN = 'https://esm.sh/@codemirror/lang-markdown@6.3.2?external=@codemirror/state,@codemirror/view,@codemirror/language'
    const CM_THEME = 'https://esm.sh/@codemirror/theme-one-dark@6.1.2?external=@codemirror/state,@codemirror/view'
    const DIFF = 'https://esm.sh/diff@7.0.0'

    const [state, view, lang, commands, md, theme, diff] = await Promise.all([
      import(CM_STATE),
      import(CM_VIEW),
      import(CM_LANG),
      import(CM_COMMANDS),
      import(CM_MARKDOWN),
      import(CM_THEME),
      import(DIFF),
    ])

    // Expose modules globally for app.js
    window.__CM = { state, view, lang, commands, md, theme, diff }

    // Load app after deps are ready
    await import('./app.js')
  </script>
</body>
</html>
