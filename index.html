<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>agent-doc</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="toolbar">
      <h1>agent-doc <span class="demo-badge">demo</span></h1>
      <div id="toolbar-actions">
        <select id="model-toolbar" title="Model">
          <option value="claude-haiku-4-5-20251001">Haiku 4.5</option>
          <option value="claude-sonnet-4-6">Sonnet 4.6</option>
          <option value="claude-opus-4-6">Opus 4.6</option>
        </select>
        <button id="submit-btn" title="Submit to agent (Ctrl+Enter)">Submit</button>
        <button id="settings-btn" title="Settings">Settings</button>
      </div>
    </header>
    <main id="editor-container">
      <div id="editor"></div>
    </main>
    <div id="terminal-container">
      <div id="terminal-header">
        <span>Terminal</span>
        <button id="terminal-toggle" title="Toggle terminal">_</button>
        <button id="terminal-clear" title="Clear">x</button>
      </div>
      <div id="terminal-output"></div>
    </div>
    <footer id="status-bar">
      <span id="status-text">Ready</span>
    </footer>
  </div>

  <dialog id="settings-dialog">
    <form method="dialog">
      <h2>Settings</h2>
      <p class="demo-notice">Demo: credentials are stored in your browser's localStorage and never sent to this server.<br><br>Auto-populate from Claude Code: <code>curl -s https://agent-doc-js.pages.dev/setup.sh | sh</code></p>
      <label>
        Anthropic API Key
        <input type="password" id="api-key-input" placeholder="sk-ant-..." autocomplete="off">
      </label>
      <label>
        Model
        <select id="model-select">
          <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5</option>
          <option value="claude-sonnet-4-6">Claude Sonnet 4.6</option>
          <option value="claude-opus-4-6">Claude Opus 4.6</option>
        </select>
      </label>
      <label>
        API Proxy URL (optional — for CORS bypass)
        <input type="text" id="proxy-url-input" placeholder="https://your-worker.workers.dev">
      </label>
      <label>
        Ragie API Key (optional — for document retrieval)
        <input type="password" id="ragie-key-input" placeholder="ragie_..." autocomplete="off">
      </label>
      <label>
        System Prompt (optional)
        <textarea id="system-prompt-input" rows="4" placeholder="Custom instructions for the agent..."></textarea>
      </label>
      <div class="dialog-actions">
        <button type="submit" id="settings-save" value="save">Save</button>
        <button type="button" id="settings-cancel">Cancel</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="dist/app.js"></script>
</body>
</html>
