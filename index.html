<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>agent-doc</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="toolbar">
      <h1>agent-doc</h1>
      <div id="toolbar-actions">
        <button id="submit-btn" title="Submit to agent (Ctrl+Enter)">Submit</button>
        <button id="settings-btn" title="Settings">Settings</button>
      </div>
    </header>
    <main id="editor-container">
      <div id="editor"></div>
    </main>
    <footer id="status-bar">
      <span id="status-text">Ready</span>
    </footer>
  </div>

  <dialog id="settings-dialog">
    <form method="dialog">
      <h2>Settings</h2>
      <label>
        Anthropic API Key
        <input type="password" id="api-key-input" placeholder="sk-ant-...">
      </label>
      <label>
        Model
        <select id="model-select">
          <option value="claude-sonnet-4-6">Claude Sonnet 4.6</option>
          <option value="claude-opus-4-6">Claude Opus 4.6</option>
          <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5</option>
        </select>
      </label>
      <label>
        System Prompt (optional)
        <textarea id="system-prompt-input" rows="4" placeholder="Custom instructions for the agent..."></textarea>
      </label>
      <div class="dialog-actions">
        <button type="submit" id="settings-save">Save</button>
        <button type="button" id="settings-cancel">Cancel</button>
      </div>
    </form>
  </dialog>

  <script type="importmap">
  {
    "imports": {
      "codemirror": "https://esm.sh/codemirror@6.0.1",
      "@codemirror/lang-markdown": "https://esm.sh/@codemirror/lang-markdown@6.3.2",
      "@codemirror/state": "https://esm.sh/@codemirror/state@6.5.2",
      "@codemirror/view": "https://esm.sh/@codemirror/view@6.36.5",
      "@codemirror/language": "https://esm.sh/@codemirror/language@6.10.8",
      "@codemirror/commands": "https://esm.sh/@codemirror/commands@6.8.0",
      "@codemirror/theme-one-dark": "https://esm.sh/@codemirror/theme-one-dark@6.1.2",
      "diff": "https://esm.sh/diff@7.0.0"
    }
  }
  </script>
  <script type="module" src="app.js"></script>
</body>
</html>
